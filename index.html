<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculadora</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #00BCD4 0%, #0097A7 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .calc-wrap {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 24px;
      padding: 24px;
      width: 100%;
      max-width: 340px;
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    .calc-display {
      background: rgba(0,0,0,0.2);
      border-radius: 14px;
      padding: 16px 20px;
      text-align: right;
      margin-bottom: 20px;
    }

    .calc-expression {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.55);
      min-height: 20px;
      margin-bottom: 4px;
      word-break: break-all;
    }

    .calc-result {
      font-size: 2.4rem;
      font-weight: 900;
      color: #fff;
      word-break: break-all;
      line-height: 1.1;
    }

    .calc-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .btn-calc {
      border: none;
      border-radius: 12px;
      font-family: 'Nunito', sans-serif;
      font-size: 1.1rem;
      font-weight: 800;
      padding: 18px 0;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.1s;
    }
    .btn-calc:active {
      transform: scale(0.93);
      opacity: 0.85;
    }

    .btn-num {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }
    .btn-num:hover { background: rgba(255,255,255,0.25); }

    .btn-op {
      background: rgba(255,255,255,0.25);
      color: #fff;
    }
    .btn-op:hover { background: rgba(255,255,255,0.35); }

    .btn-eq {
      background: #FFD54F;
      color: #1a1a1a;
    }
    .btn-eq:hover { background: #F9A825; }

    .btn-clear {
      background: rgba(255,80,80,0.35);
      color: #fff;
    }
    .btn-clear:hover { background: rgba(255,80,80,0.5); }

    .btn-zero {
      grid-column: span 2;
    }
  </style>
</head>
<body>

<div class="calc-wrap">

  <!-- Display -->
  <div class="calc-display">
    <div class="calc-expression" id="expression"></div>
    <div class="calc-result" id="result">0</div>
  </div>

  <!-- BotĂµes -->
  <div class="calc-grid">
    <button class="btn-calc btn-clear" onclick="clearAll()">AC</button>
    <button class="btn-calc btn-op"    onclick="toggleSign()">+/-</button>
    <button class="btn-calc btn-op"    onclick="percent()">%</button>
    <button class="btn-calc btn-op"    onclick="setOp('/')">Ă·</button>

    <button class="btn-calc btn-num"   onclick="addNum('7')">7</button>
    <button class="btn-calc btn-num"   onclick="addNum('8')">8</button>
    <button class="btn-calc btn-num"   onclick="addNum('9')">9</button>
    <button class="btn-calc btn-op"    onclick="setOp('*')">Ă—</button>

    <button class="btn-calc btn-num"   onclick="addNum('4')">4</button>
    <button class="btn-calc btn-num"   onclick="addNum('5')">5</button>
    <button class="btn-calc btn-num"   onclick="addNum('6')">6</button>
    <button class="btn-calc btn-op"    onclick="setOp('-')">âˆ’</button>

    <button class="btn-calc btn-num"   onclick="addNum('1')">1</button>
    <button class="btn-calc btn-num"   onclick="addNum('2')">2</button>
    <button class="btn-calc btn-num"   onclick="addNum('3')">3</button>
    <button class="btn-calc btn-op"    onclick="setOp('+')">+</button>

    <button class="btn-calc btn-num btn-zero" onclick="addNum('0')">0</button>
    <button class="btn-calc btn-num"   onclick="addDecimal()">,</button>
    <button class="btn-calc btn-eq"    onclick="calculate()">=</button>
  </div>

</div>

<script>
  let current     = '0';
  let previous    = '';
  let operator    = null;
  let shouldReset = false;

  const resultEl     = document.getElementById('result');
  const expressionEl = document.getElementById('expression');

  function updateDisplay() {
    resultEl.textContent = current.replace('.', ',');
  }

  function addNum(n) {
    if (shouldReset) { current = ''; shouldReset = false; }
    if (current === '0' && n !== '.') current = n;
    else current += n;
    updateDisplay();
  }

  function addDecimal() {
    if (shouldReset) { current = '0'; shouldReset = false; }
    if (!current.includes('.')) current += '.';
    updateDisplay();
  }

  function setOp(op) {
    if (operator && !shouldReset) calculate(true);
    previous = current;
    operator = op;
    shouldReset = true;
    const symbols = { '+': '+', '-': 'âˆ’', '*': 'Ă—', '/': 'Ă·' };
    expressionEl.textContent = previous.replace('.', ',') + ' ' + symbols[op];
  }

  function calculate(chain = false) {
    if (!operator || !previous) return;
    const a = parseFloat(previous);
    const b = parseFloat(current);
    let res;
    switch (operator) {
      case '+': res = a + b; break;
      case '-': res = a - b; break;
      case '*': res = a * b; break;
      case '/': res = b !== 0 ? a / b : 'Erro'; break;
    }
    if (!chain) {
      const symbols = { '+': '+', '-': 'âˆ’', '*': 'Ă—', '/': 'Ă·' };
      expressionEl.textContent =
        previous.replace('.', ',') + ' ' + symbols[operator] + ' ' + current.replace('.', ',') + ' =';
      operator = null;
    }
    current = res === 'Erro' ? 'Erro' : String(parseFloat(res.toFixed(10)));
    shouldReset = true;
    updateDisplay();
  }

  function clearAll() {
    current = '0'; previous = ''; operator = null; shouldReset = false;
    expressionEl.textContent = '';
    updateDisplay();
  }

  function toggleSign() {
    current = String(parseFloat(current) * -1);
    updateDisplay();
  }

  function percent() {
    current = String(parseFloat(current) / 100);
    updateDisplay();
  }

  // suporte ao teclado
  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') addNum(e.key);
    else if (e.key === '.') addDecimal();
    else if (e.key === '+') setOp('+');
    else if (e.key === '-') setOp('-');
    else if (e.key === '*') setOp('*');
        else if (e.key === 'Enter') setOp('=');

    else if (e.key === '/') { e.preventDefault(); setOp('/'); }
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Escape') clearAll();
    else if (e.key === 'Backspace') {
      current = current.length > 1 ? current.slice(0, -1) : '0';
      updateDisplay();
    }
  });
</script>

</body>
</html>
